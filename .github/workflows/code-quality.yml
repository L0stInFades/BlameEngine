name: code-quality

on:
  push:
    branches:
      - master
      - "hackops/**"
      - "rendering/**"
  pull_request:

# These jobs only read the checkout; drop the default write token.
permissions:
  contents: read

# A new push to a PR supersedes the in-flight run; pushes to master always run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Enforce .clang-format on the files a change touches (legacy code is grandfathered;
  # touch a file -> it must be formatted). Run scripts/clang_format.sh locally to fix.
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting of changed lines (incremental gate)
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then base="${{ github.event.before }}"; fi
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          bash scripts/clang_format_diff.sh "$base"

  # Build and RUN the unit tests under AddressSanitizer + UndefinedBehaviorSanitizer.
  # This closes two gaps: CI previously never ran ctest, and never ran under sanitizers.
  sanitizers:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Configure (ASan + UBSan)
        run: cmake --preset asan
      - name: Build core test suites
        run: >
          cmake --build out/build/asan -j3 --target
          test_foundation test_jobsystem test_runtime test_world_streaming
          test_asset_compiler test_task_system test_script_system
          test_gameapi test_sandbox test_boundary test_boundary_concurrency test_boundary_reliability
          test_boundary_transport test_boundary_udp test_vertical_slice
          test_physics test_actuation
          test_physics_slice test_level test_vegetation test_layered_cell test_vegetation_cook
          test_vegetation_streaming test_vegetation_store test_vegetation_query test_vegetation_view
          test_vegetation_slice
          test_water test_water_cook test_water_store test_water_view test_water_buoyancy
          test_water_query test_water_streaming test_water_slice test_water_scale test_water_fuzz
          test_water_actuation test_water_replay test_water_hazard test_water_swim test_water_render
      - name: Run tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: >
          ctest --test-dir out/build/asan --output-on-failure
          -R "FoundationTest|JobSystemTest|RuntimeTest|WorldStreamingTest|AssetCompilerTest|TaskSystemTest|ScriptSystemTest|GameApiTest|SandboxTest|BoundaryTest|BoundaryConcurrencyTest|BoundaryReliabilityTest|BoundaryTransportTest|BoundaryUdpTest|VerticalSliceTest|PhysicsTest|ActuationTest|PhysicsSliceTest|LevelTest|VegetationTest|LayeredCellTest|VegetationCookTest|VegetationStreamingTest|VegetationStoreTest|VegetationQueryTest|VegetationViewTest|VegetationSliceTest|WaterTest|WaterCookTest|WaterStoreTest|WaterViewTest|WaterBuoyancyTest|WaterQueryTest|WaterStreamingTest|WaterSliceTest|WaterScaleTest|WaterFuzzTest|WaterActuationTest|WaterReplayTest|WaterHazardTest|WaterSwimTest|WaterRenderTest"

  # Cross-platform determinism gate (ADR-0015 W3): build + run the deterministic sim tests on Linux/
  # x86_64 too (the sanitizers job above is macOS/arm64). With the engine-wide deterministic-FP flags,
  # the replay/equilibrium tests passing on a SECOND platform guards the server-authoritative red line.
  determinism:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Configure (headless)
        run: cmake --preset headless
      - name: Build determinism-sensitive sim tests
        run: >
          cmake --build out/build/headless -j3 --target
          test_physics test_water test_water_buoyancy test_water_scale test_water_slice
          test_water_actuation test_water_replay
      - name: Run determinism + buoyancy + physics tests
        run: >
          ctest --test-dir out/build/headless --output-on-failure
          -R "PhysicsTest|WaterTest|WaterBuoyancyTest|WaterScaleTest|WaterSliceTest|WaterActuationTest|WaterReplayTest"

  # ThreadSanitizer gate (W16): the sim<->UE5 boundary is the only lock-free concurrency in the engine.
  # Build + run the two-thread producer/consumer stress for SpscRing + TripleBuffer under TSan so a
  # broken acquire/release ordering (a real data race on the slot memory) fails the build, not just a
  # rare production heisenbug. Closes the TECH_DEBT P2 item (lock-free structures never ran under TSan).
  tsan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Configure (ThreadSanitizer)
        run: cmake --preset tsan
      - name: Build lock-free boundary tests
        run: cmake --build out/build/tsan -j3 --target test_boundary test_boundary_concurrency
      - name: Run boundary tests under TSan
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: >
          ctest --test-dir out/build/tsan --output-on-failure
          -R "BoundaryTest|BoundaryConcurrencyTest"

  # WASM backend under sanitizers (B2 follow-up): the optional wasm3 backend used to sit entirely
  # outside the ASan gate ("the completeness gate has holes"). This job builds BUILD_WITH_WASM=ON
  # and runs the WASM security-contract suite (hand-encoded guests, no wasm toolchain needed) plus
  # the reference sandbox suite under ASan + UBSan.
  wasm-sanitizers:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Configure (ASan + UBSan + WASM backend)
        run: cmake --preset asan -DBUILD_WITH_WASM=ON
      - name: Build sandbox test suites
        run: cmake --build out/build/asan -j3 --target test_sandbox test_sandbox_wasm
      - name: Run sandbox tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: >
          ctest --test-dir out/build/asan --output-on-failure
          -R "SandboxTest|WasmSandboxTest"

  # Windows headless gate: build the windows-headless preset (MSVC + Ninja) and run the full ctest
  # suite, so the Windows build fix is protected by CI instead of bitrotting again.
  windows-headless:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      # MSVC env comes from Microsoft's own DevShell module that ships with Visual Studio on the
      # runner image — not from ilammy/msvc-dev-cmd@v1, which is unmaintained (Node 20, deprecated
      # by GitHub on 2026-06-16). vswhere picks the newest installed toolset, so this also rides
      # the windows-latest VS2022 -> VS2026 image migration without changes. Only the env vars the
      # dev shell adds or changes are persisted to $GITHUB_ENV for the cmake/ctest steps below.
      - name: Set up MSVC environment
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw 'vswhere found no Visual Studio install with the C++ toolset' }
          $before = @{}
          Get-ChildItem env: | ForEach-Object { $before[$_.Name] = $_.Value }
          Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64 -no_logo'
          Get-ChildItem env: | Where-Object { $before[$_.Name] -ne $_.Value } |
            ForEach-Object { "$($_.Name)=$($_.Value)" } | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Configure (windows-headless)
        run: cmake --preset windows-headless
      - name: Build
        run: cmake --build --preset windows-headless
      - name: Run tests
        run: ctest --test-dir out/build/windows-headless --output-on-failure

  # Static analysis with cppcheck (advisory: surfaces issues without blocking the build).
  cppcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: >
          cppcheck --enable=warning,performance,portability --std=c++17
          --inline-suppr --quiet --error-exitcode=0
          -i third_party engine tools game
